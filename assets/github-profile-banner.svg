<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ningi Detection Lab GitHub profile banner</title>
  <desc id="desc">Dark detection-lab banner for ningi.dev GitHub profile and repository README headers.</desc>
  <defs>
    <linearGradient id="bg" x1="104" y1="38" x2="1085" y2="641" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10263A"/>
      <stop offset="0.5" stop-color="#09121C"/>
      <stop offset="1" stop-color="#04070B"/>

<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ningi.dev brand mark</title>
  <desc id="desc">Circular Ningi Detection Lab monogram with cyan signal rings and an amber detection dot.</desc>
  <defs>
    <linearGradient id="bg" x1="92" y1="76" x2="428" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#112A40"/>
      <stop offset="0.52" stop-color="#09131E"/>
      <stop offset="1" stop-color="#03070D"/>
    </linearGradient>
    <linearGradient id="ring" x1="128" y1="108" x2="390" y2="396" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6BE4FF"/>
      <stop offset="1" stop-color="#109BC8"/>
    </linearGradient>
    <linearGradient id="mark" x1="174" y1="152" x2="342" y2="356" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6FCFF"/>
      <stop offset="0.55" stop-color="#D8F5FF"/>
      <stop offset="1" stop-color="#8EE5FF"/>
    </linearGradient>
    <filter id="softGlow" x="54" y="54" width="404" height="404" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10"/>

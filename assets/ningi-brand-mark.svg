    <path d="M168 -16V528" stroke="#2A536E" stroke-width="2"/>
    <path d="M344 -16V528" stroke="#2A536E" stroke-width="2"/>
  </g>

  <circle cx="256" cy="256" r="160" stroke="#58D9FF" stroke-opacity="0.24" stroke-width="32" filter="url(#softGlow)"/>
  <circle cx="256" cy="256" r="156" fill="#06101A"/>
  <circle cx="256" cy="256" r="148" stroke="url(#ring)" stroke-width="12"/>

      <stop offset="0.55" stop-color="#D6F4FF"/>
      <stop offset="1" stop-color="#83DEFF"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.18">

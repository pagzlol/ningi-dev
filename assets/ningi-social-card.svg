<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ningi Detection Lab social card</title>
  <desc id="desc">Open Graph social card for ningi.dev matching the Ningi Detection Lab visual style.</desc>
  <defs>

  <text x="86" y="382" fill="#B3D3E2" font-family="Segoe UI, Arial, sans-serif" font-size="31">detections, honeypots, incident response</text>
  <text x="86" y="441" fill="#89AFC1" font-family="Segoe UI, Arial, sans-serif" font-size="25">detections, tooling, and lessons from the lab</text>
  <text x="86" y="493" fill="#5F879A" font-family="Segoe UI, Arial, sans-serif" font-size="23">www.ningi.dev | troy@ningi.dev</text>


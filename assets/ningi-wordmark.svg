    <circle cx="110" cy="110" r="68" fill="#06101A"/>
    <circle cx="110" cy="110" r="62" stroke="url(#ring)" stroke-width="7"/>
    <path d="M75 148V71H93L131 118V71H148V148H131L93 101V148H75Z" fill="url(#mark)"/>
    <circle cx="157" cy="68" r="5.5" fill="#FF8A5B"/>

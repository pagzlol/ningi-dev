  <text x="244" y="104" fill="#F2FAFF" font-family="Segoe UI, Arial, sans-serif" font-size="56" font-weight="800">Ningi Detection Lab</text>
  <text x="248" y="156" fill="#7BDFFF" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="700" letter-spacing="2">LIVE SECURITY RESEARCH LAB</text>
  <text x="248" y="190" fill="#89AFC1" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">www.ningi.dev | troy@ningi.dev</text>
  <circle cx="555" cy="184" r="5" fill="#FF8A5B"/>

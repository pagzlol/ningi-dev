<svg width="980" height="220" viewBox="0 0 980 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ningi Detection Lab wordmark</title>
  <desc id="desc">Horizontal Ningi Detection Lab wordmark with the Ningi Detection Lab monogram.</desc>
  <defs>
    <linearGradient id="bg" x1="34" y1="10" x2="184" y2="198" gradientUnits="userSpaceOnUse">
      <stop stop-color="#112A40"/>
      <stop offset="0.55" stop-color="#09131E"/>
      <stop offset="1" stop-color="#03070D"/>
    </linearGradient>
    <linearGradient id="ring" x1="50" y1="33" x2="168" y2="184" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6BE4FF"/>
      <stop offset="1" stop-color="#109BC8"/>
    </linearGradient>
    <linearGradient id="mark" x1="73" y1="56" x2="146" y2="159" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6FCFF"/>
      <stop offset="0.55" stop-color="#D8F5FF"/>
      <stop offset="1" stop-color="#8EE5FF"/>
